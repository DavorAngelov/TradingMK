version: "3.9"

networks:
  tradingmk-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradingmk-postgres
    restart: unless-stopped
    networks:
      - tradingmk-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradingmk}
      POSTGRES_USER: ${POSTGRES_USER:-tradingmk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradingmk_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tradingmk} -d ${POSTGRES_DB:-tradingmk}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/tradingmk-backend:${IMAGE_TAG:-latest}
    container_name: tradingmk-backend
    restart: unless-stopped
    networks:
      - tradingmk-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tradingmk}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-tradingmk}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-tradingmk_secret}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
    image: ${DOCKERHUB_USERNAME:-local}/tradingmk-frontend:${IMAGE_TAG:-latest}
    container_name: tradingmk-frontend
    restart: unless-stopped
    networks:
      - tradingmk-net
    depends_on:
      - backend
    ports:
      - "80:80"

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/tradingmk-scraper:${IMAGE_TAG:-latest}
    container_name: tradingmk-scraper
    networks:
      - tradingmk-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-tradingmk}
      DB_USER: ${POSTGRES_USER:-tradingmk}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-tradingmk_secret}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS:-300}
