# Secrets - base64-encoded values
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: tradingmk
  labels:
    app.kubernetes.io/part-of: tradingmk
type: Opaque
data:
  POSTGRES_USER: dHJhZGluZ21r
  POSTGRES_DB: dHJhZGluZ21r
  POSTGRES_PASSWORD: MTIz

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: tradingmk
  labels:
    app.kubernetes.io/part-of: tradingmk
type: Opaque
data:
  DB_PASSWORD: MTIz

---
# ConfigMaps
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: tradingmk
  labels:
    app.kubernetes.io/part-of: tradingmk
data:
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: tradingmk
  labels:
    app.kubernetes.io/part-of: tradingmk
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432/tradingmk"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SERVER_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "prod"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scraper-config
  namespace: tradingmk
  labels:
    app.kubernetes.io/part-of: tradingmk
data:
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: tradingmk
  SCRAPE_INTERVAL_SECONDS: "300"
