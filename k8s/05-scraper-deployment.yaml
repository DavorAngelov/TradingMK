# Deployment – Python Scraper

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper
  namespace: tradingmk
  labels:
    app: scraper
    app.kubernetes.io/part-of: tradingmk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scraper
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: scraper
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3;
              done
      containers:
        - name: scraper
          image: davor10/tradingmk-scraper:sha-d28efbe
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: scraper-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
