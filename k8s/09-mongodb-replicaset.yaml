apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: tradingmk
type: Opaque
data:
  MONGO_INITDB_ROOT_USERNAME: bW9uZ29BZG1pbg==
  MONGO_INITDB_ROOT_PASSWORD: bW9uZ29TZWNyZXQxMjM=

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: tradingmk
data:
  MONGO_HOST: mongodb-0.mongodb-headless.tradingmk.svc.cluster.local
  MONGO_PORT: "27017"
  MONGO_DB: tradingmk
  REPLICA_SET_NAME: tradingmk-rs

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: tradingmk
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: tradingmk
  labels:
    app: mongodb
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: tradingmk
  labels:
    app: mongodb
    app.kubernetes.io/part-of: tradingmk
spec:
  serviceName: mongodb-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - "--replSet"
            - "tradingmk-rs"
            - "--bind_ip_all"
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

  volumeClaimTemplates:
    - metadata:
        name: mongodb-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
